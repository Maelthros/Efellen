Berserker abilities
active abilities : Rage, leap slam, warcry, tenacity

The Berserker is a savage warrior that wields two-handed weapons to great effect. In combat, they fly into a murderous rage that empowers them.
In order to activate this Ascension, you need to have 95 base skill in Tactics, camping and Magic Resist. Every time you level up the class, the requirement also
increases by 1. So a level 20 Berserker cannot activate this ascension unless they have 115 base skill in Tactics, camping and Magic Resist.

These are the abilities that the berserker learns as they level up:
rage, level 1
command: [BerserkerRage
when active, the character gains +(15+level) strength, gains immunity to paralyze, causes 10% increased damage and has 10% reduced defend chance. 
Lasts for 10 seconds +1 sec/level. Has a one minute cooldown. When it ends, the character loses half of its stamina.
At higher levels: 
- at level 10, while raging, the character gains + (level/2) on all resistances while raging, and gains an additional 5% extra increased damage, and a 5% reduced defend 
    chance.  
- at level 15, while raging, if the character would take a hit that takes more than 40% of their total hit points, they lose 40% of their total hitpoints instead
- at level 20, while raging, the character gains an additional 5% damage, and a 5% reduced defend chance

Leap slam, level 6
command: [BerserkerLeapSlam
When used, the character chooses a free tile that is at least 2 tiles away from them and its moved to that tile. The maximum range is equal to  3 + level/4. When landing, 
the character causes 20-35 + ( (str / 15) + level / 3 ) damage on all targets adjacent to that tile. Has a cooldown of 9 seconds, minus one second per 3 berserker levels. 
At higher levels:
- at level 12, when landing, all targets adjacent to the landing square are stunned for 3 seconds

Warcry, level 11
command: [BerserkerWarCry
When used, all enemies around the Berserker in a radius of 3 + 1/5 levels receive the following penalty: they lose (25 + 1/level) strength, (10+1/level) Dexterity and (10+1/level) intelligence 
for (20+1/level) seconds, and the berserker all allies of the Berserker recover 2 stamina every two seconds for 20+1/level seconds. Has a 1 minute cooldown.
At higher levels:
at level 16, all enemies affected by the warcry lose 20+2/level stamina immediately and lose an additional 2+1/level stamina every 2 seconds for 10+1/level seconds

Tenacity, level 18
command:[BerserkerTenacity
When used, the berserker heals to full health immediately and heals to full health again every 10 seconds for 30 seconds. Has a 2 minutes cooldown. 
At higher levels:
at level 20, the berserker also heals to full stamina and heals to full stamina again every 10 seconds for 30 seconds.

passive abilities: cleave, uncanny dodge, pummeling strikes, undying wrath

cleave, level 2
when making a melee strike with a two handed weapon, the berserker has a 4% + 1% level chance of making another strike against an adjacent enemy
at higher levels:
- at level 5, when making a melee strike with a two handed weapon, the berserker has a 1%+1%/level chance of making another strike against another adjacent enemy not affected by the first additional strike
- level 13, when making a melee strike with a two handed weapon, the berserker a 1%+1%/level chance of making another strike against another adjacent enemy not affected by the first or second additional strikes

uncanny dodge, level 8
The barbarian has a 25+1%/level chance of ignoring the effects of traps
At higher levels:
- at level 17, the chance of ignoring traps increases to 45+1%/level

pummeling strikes, level 14
when making a strike with a two handed melee weapon, the berserker has a (level/4)% chance of ignoring the target's armor
at higher levels: 
- at level 19, the chance increases to (level/2)% chance of ignoring the target's armor.

undying wrath, level 20
If the berserker takes a hit that would reduce their hit points to 0 or less, they reduce it to 1 instead and the cooldown on their Warcry is set to zero. This effect can trigger once per minute



Archmage abilities
     active: Arcane storm, Conflux, Mana singularity , Timestop 
    
    "The Archmage is a master of the Arcane. In combat, they control their opponents and execute powerful spells to bend the Weave itself to their will itself.
    In order to activate this Ascension, you need to have 95 base skill in both Magery and Psychology. Every time you level up the class, the requirement also increases by 1.
    So a level 20 Archmage cannot activate this ascension unless they have 115 base skill in both Magery and Psychology"

Arcane storm, level 1
command: [ArchmageArcaneStorm
The archmage unleashes (6 + 1 per 3 archmage levels) energy missiles at the nearest target, each missile causes 10-18 + (int/25 + level/3) damage. Casting this spell costs 45 mana, and once used, it cannot be used again for (45-1/level) seconds. 
At higher levels: 
- at level 10, a target hit by an arcane storm has a 3% chance per level of the archmage to receive a -(8 + level/4) energy resistance debuff that lasts for 12 + archmage level /2 seconds
- at level 15, a target hit by an arcane storm loses 34 + level/2 stamina after being hit by a missile storm
- at level 20, if a target is killed by an arcane storm, the cooldown on Conflux is set to zero. 

Conflux, level 6
command: [ArchmageConflux
when activated, the archmage's spell damage is increased by 10% for (10 +1/level) seconds, 2 minutes cooldown.
At higher levels:
- at level 12, the spell damage is increased by 15%.

Mana Singularity, level 11
command: [ArchmageMassSingularity
The Archmage creates a collapsing arcane vortex at a target location within 2 + (level/3) tiles. After 2.5 seconds, the singularity explodes, causing 25-40 + (int/10 + level/2) energy damage to all hostile targets up to 2 tiles away from the source point. 
Targets caught in the explosion also lose 20+level mana. The archmage recovers 4 mana per enemy hit. Activating this ability costs 50 mana. This ability has a cooldown of 60 seconds. 
At higher levels:
at level 16, all enemies hit by this ability are paralyzed for 4 seconds, and lose 20+level stamina. 

Timestop, level 18
command:[ArchmageTimestop
all hostile creatures up to (3+(level/5)) tiles away from the caster are paralyzed for (12+level/4) seconds. This ability costs 60 mana and has a 3 minutes cooldown.
At higher levels:
at level 20, once the paralyze ends, all enemies hit by this ability lose 40+level mana and stamina.

passive:  mana vault, weave reflection, arcane tempest, Weave Dominion

mana vault, level 2
when an enemy would leech or drain mana from the archmage, there's a 2% chance per level that the mana in immediately refunded to the archmage
at higher levels:
- at level 5, when an enemy would leech or drain mana from the archmage, they receive 15-25 + (level/2) energy damage
- level 13, when an 
enemy would leech or drain mana from the archmage, they are paralyzed for 2 seconds

weave reflection, level 8
- the archmage receives a 2.5%/level chance of reflecting spells
At higher levels:
- at level 17, when the archmage reflects a spell, they have a 1% chance / level of setting the cooldown on Conflux to zero

arcane tempest, level 14
when casting a spell at a hostile target, there's a (0.25 * level)% chance of triggering a Mana singularity at the target that costs no mana and doesn't have a cooldown.
at higher levels: 
- at level 19, when arcane tempest triggers, there's a 1% chance/level that the cooldown on arcane storm is set to zero.

Weave Unraveling, level 20
when casting a harmful spell at a target, there's a 0.25% chance per level of creating weave disruptions around it. The amount of disruptions 
varies between 6-12, and they last from 12 to 22 seconds. Anyone standing on top of these disruptions receives 14-22 + (int/15) energy damage per second. 



Palemaster Abilities
    
    The Palemaster is death made flesh. In combat, they control an army of undead and curse and enfeeble their opponents until they have met their end.
    In order to activate this Ascension, you need to have 95 base skill in both Necromancy and Spiritualism. Every time you level up the class, the requirement also increases by 1.
    So a level 20 Palemaster cannot activate this ascension unless they have 115 base skill in both Necromancy and Spiritualism
    Palemasters also are required to revel in death and vileness, and they will not gain experience in this class if they have learned Knightship, Elementalism or Bushido, or if they stray from the path of evil

    Undying hordes, level 1
    command: [PalemasterUndyingHordes
    The Palemaster calls forth a mindless horde of undead to attack their enemies. These will attack anything hostile to the caster relentlessly until they are destroyed or until they crumble into dust. 
    The Undying hordes has a 4 minutes cooldown between uses.   
    The horde lasts for 60 (+3 per level) seconds and its composition is based on the Palemaster Level. 
    Level 1-4: 3-5 skeletons, 2-3 skeleton warriors
    Level 4-8: 3-5 skeletons, 2-3 skeleton warriors, 1-2 skeleton knights
    Level 8-12: 3-4 skeleton warriors, 2-3 skeleton knights, 1-2 mummies
    Level 13-16: 2-3 skeleton knights, 2-3 mumies, 1-2 ancient mummies, 1 undead giant
    Level 17-19: 3-4 undead giants, 2-3 ancient mummies, 1 skeletal dragon
    Level 20: 4-5 undead giants, 3-4 ancient mummies, 1-2 skeletal dragons

    Enervate, level 6
    command: [PalemasterEnervate
    The palemaster syphons life from their enemies, feeding himself and enfeebling them. 
    When cast, this spell causes all hostile living creatures in up to 3 + (1 per 5 levels) tiles receive 40 + (level /3 ) cold damage and lose the same amount in mana. 
    For every creature hit, the palemaster recovers 5 hit points and 5 mana, to a maximum of 50 of each. Creatures hit also receive -(5 + palemaster level / 4)% on 
    their strength and dexterity for 30 seconds. This ability costs 30 mana to activate and has a one minute cooldown. 
    At higher levels:
    - at level 12, the maximum amount recovered is capped at 100 for hit points and mana.

    Circle Of Death, level 11
    command: [PalemasterCircleOfDeath
    The palemaster corrupts the weave to erode life from their enemies. This ability creates a circle arount the target creature, and all living creatures up to 2 (+1 per 5 levels)
     of it receive 12-18 + (level /2 ) + (int / 20) cold damage per second for an amount of seconds equal to 3 + level / 4. This ability has a 2 minutes cooldown and costs 60 mana to activate.
    At higher levels:
    at level 16, creatures caught in the circle lose stamina every second equal to half the damage dealt

    Danse Macabre, level 18
    command: [PalemasterDanseMacabre
    The Palemaster shatters the gate between words, bringing the ever hungry hordes to the land of the living. 
    This ability has a 4 minutes cooldown and costs 80 mana to activate
    Every second for level/3 seconds, one of those happens:
        - 1-2 undead giants are spawned and attack the enemies of the pale master, they last for 30 seconds 
        - 2-3 mummy lords are spawned and attack the enemies of the pale master, they last for 30 seconds
        - every undead under the palemaster's control that is up to 5 tiles away from the palemaster heals an amount of hit points equal to 25% of their maximum hit points
        - the palemaster heals to full health
    At higher levels:
    at level 20, these effects are added to the possible effects that happen every second:
        - every hostile living creature that is up to 3 tiles away from the palemaster and that is at less than 50% of their maximum hit points loses 10% of their hit points
        - all living creatures up to 4 tiles away from the pale master receive a -20% debuff to their strenght that lasts for 30 seconds
        - 1 skeletal dragon spawns and attack the enemies of the pale master, it lasts for 30 seconds


    deathless vigor, level 2
    when casting an offensive necromancy spell, 1.5% per level chance of recovering 2 + (level / 2) hit points 
    at higher levels:l
    - at level 5, 0.25% per level chance of gaining +10% spell damage for 15 seconds
    - level 13, the spell damage bonus increases to +15%, the duration increases to 25 and the chance increases to 0.45% per level
    
    undead graft, level 8
    when casting an offensive necromancy spell while wearing a full set of bone armor, there's a 0.25% per level chance all friendly summoned undead creatures will heal 5% of their hit points.
    at higher levels: 
    at level 17: when undead graft triggers, friendly summoned undead cretures recover 2% of their maximum health per second for level/2 seconds 

    creeping cold, level 14
    when casting wither, there's a 0.25% chance per level that it will trigger an additional time
    at higher levels: 
    - at level 19, when the creeping cold effect triggers, there's a 0.25% chance per level that enervate will be cast automatically ignoring mana costs and cooldown

    herald of hereafter, level 20
    when casting a harmful spell at a target, there's a 0.25% chance per level of creating weave disruptions around it. The amount of disruptions 
    varies between 6-12, and they last from 12 to 22 seconds. Anyone standing on top of these disruptions receives 14-22 + (int/15) poison damage per second. 



    Crusader

    The Crusader is the embodiment of virtue. In combat, they stand tall in defiance against evil.
    In order to activate this Ascension, you need to have 95 base skill in Knightship, spiritualism and Tactics. Every time you level up the class, the requirement also increases by 1.
    So a level 20 Crusader cannot activate this ascension unless they have 115 base skill in Knightship, spiritualism and Tactics
    Crusaders also are required to follow the path of justice and uphold good, and they will not gain experience in this class if they have learned Bushido, Necromancy or Forensics, or if they stray from the path of good.

    Smite, level 1
    command: [CrusaderSmite
    The crusader channels its valor and calls forth an explosion of purifying flame. This effect causes 20-32 +( level / 2 + str/15) damage to all evil creatures that are up to 2 (+1 per 5 levels) tiles away from the crusader
    Smite costs 20 mana and 20 stamina to activate, and has a 1 minute cooldown.
    - Level 10: hostile creatures that have karma of -10k or lower are paralyzed for 4(+1 per 6 levels) seconds after being hit by the smite
    - Level 15: friendly creatures with positive karma caught in the area of the smite are healed for 20 + level/2 hit points
    - Level 20: hostile evil creatures that have karma of -10k or lower damaged by the smite are caught in searing flames. They receive 10-20 + str/15 fire damage every 2 seconds for 12 seconds

    Charge, level 6
    command: [CrusaderCharge
    When used, the character chooses a free tile that is at least 2 tiles away from them and its moved to that tile. The maximum range is equal to  3 + level/5. When arriving,
    every hostile creature adjacent to that tile has a 1% per level chance of being paralyzed for 3 seconds.  
    Has a cooldown of 9 seconds, minus one second per 3 crusader levels. 
    At higher levels:
    - Level 12: when arriving, all hostile creatures adjacent to the destination square receive 30-45 + ((str / 15) + level / 3) physical damage

    Aura of Hope, level 11
    command: [CrusaderAuraOfHope
    When used, the crusader and all friendly creatures up to 4 tiles away from the crusader receive the following benefits:
    - they restore 12 + (crusader level / 2) hitpoints every 4 seconds per 30 seconds
    - they restore 6 + (crusader level / 2) mana every 4 seconds per 30 seconds
    - they restore 6 + (crusader level / 2) stamina every 4 seconds per 30 seconds
    This skill has a 3 minutes cooldown, and costs 40 mana and 40 stamina to activate
    - Level 16: creatures affected by the aura of hope are healed to full health once the buff expires

    Heavenly Gate, level 18
    command: [CrusaderHeavensGate
    The crusader opens the pearly gates and calls forth a celestial companion to aid them in their war against all evil.
    The creature is a powerful Archon that requires 4 control slots and remains at the crusader's site until defeated. 
    Activating this ability costs 60 mana and 60 stamina. It has a 5 minutes cooldown. 
    - Level 20: there's a 1% chance per level that two archons will be summoned instead. 

    Divine Grace, level 2
    the crusader has a 4% chance per level chance of automatically healing from lesser, regular and greater poisons. 
    - Level 5:  the chance also applies to deadly poisons.
    - Level 13:  the chance also applies to lethal poisons.
    
    Holy Fervor, level 8
    When the crusader kills a demon, they have a 1.5% per level chance of triggering an AoE explosion of holy fire, causing 20-32 + (level/2 + str/15) damage to all evil hostile creatures that are up to 2 (+1 per 5 levels) tiles away from the crusader
    - Level 17: when Holy Fervor triggers, the Cooldown on Smite is set to zero

    Inquisitorial Strikes, level 14
    the crusader's melee weapon strikes cause + (level/2)% damage against demons
    - Level 19: the crusader's melee weapon strikes cause + (level/4)% damage against evil creatures

    Divine Judgement, level 20
    When the crusader kills a powerful evil creature, there's a 2.5% chance that a strong creature called Luminar will be summoned to aid the Crusader on their war against evil.
    The creature will attack any nearby opposing creature with great ferocity, and will remain in the material plane for one minute. 


    Assassin

    The Assassin is an expert in ending lifes prematurely. In combat, they employ poisons to great effect to hinder and annihilate their foes.
    In order to activate this Ascension, you need to have 95 base skill in both Poisoning, hiding and Fencing. Every time you level up the class, the requirement also increases by 1.
    So a level 20 Crusader cannot activate this ascension unless they have 115 base skill in both Poisoning, hiding and Fencing
    Crusaders also are required to abandon their morals, and they will not gain experience in this class if they have learned Bushido or knightship, or if they abandon the path of evil.

    Noxious Cloud, level 1
    command: [AssassinNoxiousCloud
    The assassin creates a cloud of foul vapors at target location that poisons all enemies caught in its area.
    The cloud inflicts greater poison on all affected enemies. This ability costs 30 mana and 30 stamina to activate. 
    This ability has a 1 minute cooldown. The are of the cloud is equal to 1 + 1 per 6 levels.
    - Level 10: The cloud inflics Deadly poison on all affected enemies.
    - Level 15: The cloud inflicts Lethal poison on all affected enemies.
    - Level 20: all affected enemies lose 20 poison resist for 30 seconds.

    Crippling poison, level 6
    command: [AssassinCripplingPoison
    The assassin throws a vial of crippling poison at a target, inflicting deadly poison on it and preventing them from walking for level / 2 seconds
    This ability costs 40 mana and 40 stamina to activate and has a 1 minute cooldown.
    At higher levels:
    - Level 12: The crippling poison is Lethal and affects all hostile creatures up to 2 tiles away from the original target. 

    Toxic surge, level 11
    command: [AssassinToxicSurge
    For the next 30 seconds, the assassin causes + 10% damage bonus with weapon strikes against poisoned creatures. 
    This ability costs 40 mana and 40 stamina to activate and has a 2 minutes cooldown.
    - Level 16: When activated, there's a 1% chance per level of setting the cooldown on Noxious Cloud to zero. 

    Cleansing Annihilation, level 18
    command: [AssassinCleansingAnnihilation
    The assassin inflicts lethal poison on the target, then immediately consumes all of its ticks. 
    If the target survives, all creatures around it to up to 3 tiles away are the inflicted with a lethal poison. 
    Activating this ability costs 50 mana and 50 stamina and it has a 4 minutes cooldown. 
    - Level 20: when activating this ability, there's a 1% chance per level that the cooldown on toxic surge will be set to zero. 
    
    Virulent Strikes, level 2
    When applying a poison on a target with a strike, the assassin has a 1% per level chance of immediately resolving 1 poison tick
    - Level 5: when making a weapon attack against a poisoned creature, the assassin has a 0.25% chance per level of immediately resolving a poison tick.
    - Level 13: when making a weapon attack against a poisoned creature, the assassin has a 0.12% chance per level of immediately resolving an additional poison tick.
    
    dangerous habits, level 8
    increases tick damage of poisons inflicted by the assassin by 9%
    - Level 17: increases tick damage of poisons inflicted by the assassin by 18%

    Deadly Strikes, level 14
    The assassin causes 9% more damage with attacks to poisoned creatures.
    - Level 19: attacks against poisoned creatures ignore 25% of the target's poison resistance. 

    Terminal, level 20
    When killing a poisoned creature, the assassin has a 0.25% chance per level of inflicting lethal poison on all hostile creatures that are up to 2 tiles away from it. 


